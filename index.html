<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="manifest" href="manifest.json">    
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic-Tac-Toe Pro Edition</title>
    <style>
        :root {
            --bg: #0f172a; 
            --card: #1e293b;
            --neon-x: #00f2ff; 
            --neon-o: #ff007a;
            --text: #f8fafc;
            --accent: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; overflow: hidden;
        }

        /* TELA DE SETUP */
        #setup {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; padding: 20px;
        }

        h1 { color: var(--neon-x); letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 15px var(--neon-x); }

        input { 
            padding: 15px; border-radius: 12px; border: 1px solid var(--accent);
            background: var(--card); color: white; width: 100%; max-width: 300px; margin: 10px 0;
            font-size: 1rem; outline: none;
        }

        input:focus { border-color: var(--neon-x); }

        /* PLACAR */
        .scoreboard {
            display: flex; gap: 15px; margin-bottom: 20px;
            background: var(--card); padding: 15px 25px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .score-box { text-align: center; min-width: 60px; }
        .score-box span { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .score-box strong { display: block; font-size: 1.5rem; margin-top: 5px; }

        /* TABULEIRO */
        .board {
            display: grid; 
            grid-template-columns: repeat(3, min(28vw, 100px));
            grid-template-rows: repeat(3, min(28vw, 100px));
            gap: 10px;
            position: relative;
        }

        .cell {
            background: var(--card); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cell:active { transform: scale(0.95); }
        .cell.x { color: var(--neon-x); text-shadow: 0 0 15px var(--neon-x); }
        .cell.o { color: var(--neon-o); text-shadow: 0 0 15px var(--neon-o); }
        .cell.winner { background: #ffffff22; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* BOTÕES */
        .controls { margin-top: 30px; display: flex; gap: 10px; }

        button {
            padding: 12px 20px; border-radius: 10px; border: none;
            cursor: pointer; font-weight: bold; background: var(--accent); color: white;
            transition: 0.3s; font-size: 0.9rem;
        }

        .btn-start { background: var(--neon-x); color: #000; width: 100%; max-width: 300px; font-size: 1.1rem; margin-top: 15px;}
        button:hover { opacity: 0.9; }

        #status { margin-bottom: 15px; font-weight: 500; letter-spacing: 1px; }

        .confetti { position: absolute; pointer-events: none; z-index: 99; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>TIC TAC TOE</h1>
        <input type="text" id="p1Input" placeholder="Nome Jogador X">
        <input type="text" id="p2Input" placeholder="Nome Jogador O (Vazio = CPU)">
        <button class="btn-start" onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div class="scoreboard">
        <div class="score-box">
            <span id="nameX">X</span>
            <strong id="sx" style="color: var(--neon-x);">0</strong>
        </div>
        <div class="score-box" style="border-left: 1px solid #334155; border-right: 1px solid #334155; padding: 0 15px;">
            <span>Empates</span>
            <strong id="sd">0</strong>
        </div>
        <div class="score-box">
            <span id="nameO">O</span>
            <strong id="so" style="color: var(--neon-o);">0</strong>
        </div>
    </div>

    <div id="status">Aguardando...</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
        <button onclick="resetBoard()">Jogar Novamente</button>
        <button onclick="clearStats()" style="background: transparent; color: #64748b; border: 1px solid #334155;">Zerar Placar</button>
    </div>

    <script>
        let p1, p2, isCPU, currentPlayer = 'X', gameState = ["","","","","","","","",""], active = false;
        let stats = { x: 0, o: 0, d: 0 };
        
        const statusEl = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');

        // Carregar placar salvo
        window.onload = () => {
            const saved = localStorage.getItem('tictactoe_pro_stats');
            if(saved) {
                stats = JSON.parse(saved);
                updateScoreUI();
            }
        };

        function startGame() {
            p1 = document.getElementById('p1Input').value.trim() || "Jogador X";
            p2 = document.getElementById('p2Input').value.trim() || "CPU";
            isCPU = !document.getElementById('p2Input').value.trim();
            
            document.getElementById('nameX').innerText = p1.substring(0, 10);
            document.getElementById('nameO').innerText = p2.substring(0, 10);
            document.getElementById('setup').style.display = 'none';
            
            active = true;
            statusEl.innerText = `Vez de ${p1}`;
        }

        function vibrate(ms) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        cells.forEach(c => c.addEventListener('click', e => {
            const idx = e.target.dataset.index;
            if (gameState[idx] !== "" || !active) return;
            
            handleMove(idx);
            
            if(active && isCPU && currentPlayer === 'O') {
                setTimeout(cpuMove, 600);
            }
        }));

        function handleMove(idx) {
            vibrate(40);
            gameState[idx] = currentPlayer;
            cells[idx].innerText = currentPlayer;
            cells[idx].classList.add(currentPlayer.toLowerCase());
            
            if(checkWin()) return;
            
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusEl.innerText = `Vez de ${currentPlayer === 'X' ? p1 : p2}`;
        }

        function cpuMove() {
            // Inteligência Simples: Tenta ganhar, depois bloquear, depois aleatório
            let bestMove = findBestMove();
            handleMove(bestMove);
        }

        function findBestMove() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            
            // 1. Tenta ganhar
            for(let w of wins) {
                let check = w.map(i => gameState[i]);
                if(check.filter(v => v === 'O').length === 2 && check.filter(v => v === "").length === 1) {
                    return w[check.indexOf("")];
                }
            }
            // 2. Bloqueia X
            for(let w of wins) {
                let check = w.map(i => gameState[i]);
                if(check.filter(v => v === 'X').length === 2 && check.filter(v => v === "").length === 1) {
                    return w[check.indexOf("")];
                }
            }
            // 3. Aleatório
            let empty = gameState.map((v,i) => v===""?i:null).filter(v=>v!==null);
            return empty[Math.floor(Math.random()*empty.length)];
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            
            for(let w of wins) {
                if(gameState[w[0]] && gameState[w[0]]===gameState[w[1]] && gameState[w[0]]===gameState[w[2]]) {
                    statusEl.innerText = `${currentPlayer==='X'?p1:p2} VENCEU!`;
                    w.forEach(idx => cells[idx].classList.add('winner'));
                    stats[currentPlayer.toLowerCase()]++;
                    endGame();
                    createConfetti();
                    return true;
                }
            }
            
            if(!gameState.includes("")) {
                statusEl.innerText = "EMPATE!";
                stats.d++;
                endGame();
                return true;
            }
            return false;
        }

        function endGame() {
            active = false;
            vibrate([100, 50, 100]);
            updateScoreUI();
            localStorage.setItem('tictactoe_pro_stats', JSON.stringify(stats));
        }

        function updateScoreUI() {
            document.getElementById('sx').innerText = stats.x;
            document.getElementById('so').innerText = stats.o;
            document.getElementById('sd').innerText = stats.d;
        }

        function resetBoard() {
            gameState = ["","","","","","","","",""];
            currentPlayer = 'X';
            active = true;
            statusEl.innerText = `Vez de ${p1}`;
            cells.forEach(c => {
                c.innerText = "";
                c.className = 'cell';
            });
        }

        function clearStats() {
            if(confirm("Deseja zerar o placar?")) {
                stats = { x: 0, o: 0, d: 0 };
                updateScoreUI();
                localStorage.removeItem('tictactoe_pro_stats');
            }
        }

        function createConfetti() {
            for(let i=0; i<80; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                const size = Math.random() * 8 + 4 + 'px';
                c.style.width = size; c.style.height = size;
                c.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                document.body.appendChild(c);

                const anime = c.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${(Math.random()-0.5)*300}px, 100vh) rotate(${Math.random()*1000}deg)`, opacity: 0 }
                ], { duration: Math.random() * 2000 + 1500, easing: 'ease-out' });
                
                anime.onfinish = () => c.remove();
            }
        }
    </script>
</body>
</html>
